<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Visibility Report Generator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#07070d;--s1:#111119;--s2:#18182a;--bd:#282840;--tx:#e0e0f0;--dim:#7878a0;--ac:#7c5cfc;--ac2:#a898ff;--grn:#00d4aa;--red:#ff5e6e;--orn:#ffc552}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
.hdr{padding:16px 32px;border-bottom:1px solid var(--bd);background:var(--s1);display:flex;align-items:center;gap:14px}
.hdr .logo{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;color:var(--ac2)}.hdr .sep{width:1px;height:22px;background:var(--bd)}.hdr .sub{font-size:13px;color:var(--dim)}
.cfg{max-width:860px;margin:32px auto;padding:0 20px}.card{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:28px 32px}.card h2{font-size:17px;font-weight:600;margin-bottom:20px}
.fg{display:flex;flex-direction:column;gap:5px;position:relative;margin-bottom:16px}
.fg label{font-size:11px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
.fg input{background:var(--bg);border:1px solid var(--bd);border-radius:7px;padding:10px 14px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:13px;outline:none}
.fg input:focus{border-color:var(--ac)}.fg input::placeholder{color:var(--dim);opacity:.7}
.dd{position:absolute;top:100%;left:0;right:0;background:var(--s2);border:1px solid var(--bd);border-radius:0 0 7px 7px;max-height:240px;overflow-y:auto;z-index:50;display:none}.dd.open{display:block}
.dd-item{padding:8px 14px;cursor:pointer;font-size:13px}.dd-item:hover{background:var(--ac);color:#fff}
.btn{margin-top:8px;width:100%;padding:13px;background:linear-gradient(135deg,var(--ac),#9b6cff);border:none;border-radius:9px;color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer}
.btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 24px #7c5cfc55}.btn:disabled{opacity:.45;cursor:not-allowed}

ul.tk{list-style:none;padding:0}ul.tk li{padding:7px 0 7px 18px;position:relative;font-size:12px;color:#555;line-height:1.5;border-bottom:1px solid #f2f2f2}
ul.tk li:last-child{border:none}ul.tk li::before{content:'—';position:absolute;left:0;color:#6c5ce7;font-weight:700}

.dlb{position:sticky;bottom:0;background:var(--s1);border-top:1px solid var(--bd);padding:14px 32px;display:flex;justify-content:center;gap:14px;z-index:100}
.db{padding:10px 28px;border-radius:7px;border:1px solid var(--bd);background:var(--s2);color:var(--tx);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer}
.db:hover{background:var(--ac);border-color:var(--ac)}.db.pr{background:linear-gradient(135deg,var(--ac),#9b6cff);border-color:transparent;color:#fff}
.sp{display:inline-block;width:14px;height:14px;border:2px solid #fff4;border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

const CL=['#6c5ce7','#00cec9','#fd79a8','#fdcb6e','#74b9ff','#e17055','#a29bfe','#55efc4','#fab1a0','#81ecec','#636e72','#2d3436','#0984e3','#d63031','#00b894','#e84393','#6ab04c','#eb4d4b','#7ed6df','#f9ca24'];
let brandColorMap={};
function getBrandColor(n){if(!brandColorMap[n])brandColorMap[n]=CL[Object.keys(brandColorMap).length%CL.length];return brandColorMap[n]}
function L(m,t=''){const el=document.getElementById('log');el.classList.add('on');el.innerHTML+=`<div class="${t==='e'?'er':t==='w'?'wr':'ok'}">› ${m}</div>`;el.scrollTop=9e9}

function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}
function pf(v){return ((parseFloat(v)||0)*100).toFixed(1)+'%'}
function fmt(d){return d.toISOString().split('T')[0]}
function getDates(){const e=new Date();e.setDate(e.getDate()-1);const s=new Date(e);s.setDate(s.getDate()-29);return{start:fmt(s),end:fmt(e)}}
function getMonthYear(){return new Date().toLocaleDateString('en-US',{month:'long',year:'numeric'}).toUpperCase()}
function newReport(){brandInput.value='';brandInput.dataset.selectedId='';document.getElementById('cfgPanel').scrollIntoView({behavior:'smooth'})}

async function apiRaw(m,p,q={},b=null){const r=await fetch('/proxy',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({method:m,apiPath:p,query:q,body:b,apiKey:API_KEY})});let d;try{d=await r.json()}catch{throw new Error(`Non-JSON response from ${p}`)}if(r.status>=400||d.error)throw new Error(d.error||d.message||`HTTP ${r.status}`);return d}
async function api(m,p,q={},b=null){const pid=document.getElementById('projectId').value;if(pid)q.project_id=pid;return apiRaw(m,p,q,b)}

let allProjects=[];
const projInput=document.getElementById('projectName'),projDD=document.getElementById('projectDD'),projHidden=document.getElementById('projectId');
projInput.addEventListener('focus',async()=>{if(!allProjects.length){try{allProjects=((await apiRaw('GET','projects')).data||[]).sort((a,b)=>a.name.localeCompare(b.name))}catch(e){}}showProjDD(projInput.value)});
projInput.addEventListener('input',()=>showProjDD(projInput.value));
function showProjDD(q){const m=allProjects.filter(p=>!q||p.name.toLowerCase().includes(q.toLowerCase()));if(!m.length){projDD.classList.remove('open');return}projDD.innerHTML=m.map(p=>`<div class="dd-item" data-id="${p.id}" data-name="${esc(p.name)}">${esc(p.name)}</div>`).join('');projDD.classList.add('open')}
projDD.addEventListener('click',e=>{const i=e.target.closest('.dd-item');if(!i)return;projInput.value=i.dataset.name;projHidden.value=i.dataset.id;projDD.classList.remove('open');brandInput.value='';brandInput.dataset.selectedId='';allBrands=[]});

let allBrands=[];
const brandInput=document.getElementById('brandName'),brandDD=document.getElementById('brandDD');
brandInput.addEventListener('focus',async()=>{if(!allBrands.length&&projHidden.value){try{allBrands=((await api('GET','brands')).data||[]).sort((a,b)=>a.name.localeCompare(b.name))}catch(e){}}showBrandDD(brandInput.value)});
brandInput.addEventListener('input',()=>showBrandDD(brandInput.value));
brandInput.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();brandDD.classList.remove('open');go()}});
function showBrandDD(q){const m=allBrands.filter(b=>!q||b.name.toLowerCase().includes(q.toLowerCase()));if(!m.length){brandDD.classList.remove('open');return}brandDD.innerHTML=m.map(b=>`<div class="dd-item" data-id="${b.id}" data-name="${esc(b.name)}">${esc(b.name)}</div>`).join('');brandDD.classList.add('open')}
brandDD.addEventListener('click',e=>{const i=e.target.closest('.dd-item');if(!i)return;brandInput.value=i.dataset.name;brandInput.dataset.selectedId=i.dataset.id;brandDD.classList.remove('open')});
document.addEventListener('click',e=>{if(!projInput.contains(e.target)&&!projDD.contains(e.target))projDD.classList.remove('open');if(!brandInput.contains(e.target)&&!brandDD.contains(e.target))brandDD.classList.remove('open')});

// Donut SVG with leader lines and anti-overlap labels
function donutSVG(items,size){
  size=size||220;const cx=size/2,cy=size/2,r=size*0.34,r2=size*0.20;
  let cum=0;const total=items.reduce((s,i)=>s+i.val,0);
  let slices='';
  // Collect label positions first
  const labels=[];
  let cum2=0;
  items.forEach(item=>{
    const pct=item.val/total;const a1=cum2*2*Math.PI-Math.PI/2;cum2+=pct;const a2=cum2*2*Math.PI-Math.PI/2;
    const mid=(a1+a2)/2;
    const anchorX=cx+r*Math.cos(mid);const anchorY=cy+r*Math.sin(mid);
    const isRight=anchorX>=cx;
    const labelR=r+22;
    let lx=cx+labelR*Math.cos(mid);let ly=cy+labelR*Math.sin(mid);
    labels.push({name:item.name,pctVal:Math.round(item.val*100),isTarget:item.isTarget,anchorX,anchorY,lx,ly,isRight,color:item.color});
  });
  // Anti-overlap: sort labels by y, push apart if too close (min 12px gap)
  const leftLabels=labels.filter(l=>!l.isRight).sort((a,b)=>a.ly-b.ly);
  const rightLabels=labels.filter(l=>l.isRight).sort((a,b)=>a.ly-b.ly);
  function spread(arr){for(let i=1;i<arr.length;i++){if(arr[i].ly-arr[i-1].ly<12){arr[i].ly=arr[i-1].ly+12}}}
  spread(leftLabels);spread(rightLabels);

  // Draw slices
  cum=0;
  items.forEach(item=>{
    const pct=item.val/total;const a1=cum*2*Math.PI-Math.PI/2;cum+=pct;const a2=cum*2*Math.PI-Math.PI/2;const large=pct>0.5?1:0;
    const x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1),x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
    const ix1=cx+r2*Math.cos(a2),iy1=cy+r2*Math.sin(a2),ix2=cx+r2*Math.cos(a1),iy2=cy+r2*Math.sin(a1);
    slices+=`<path d="M${x1},${y1} A${r},${r} 0 ${large} 1 ${x2},${y2} L${ix1},${iy1} A${r2},${r2} 0 ${large} 0 ${ix2},${iy2} Z" fill="${item.color}"/>`;
  });

  // Draw leader lines and labels
  let labelsSvg='';
  labels.forEach(l=>{
    const endX=l.isRight?l.lx-4:l.lx+4;
    labelsSvg+=`<line x1="${l.anchorX}" y1="${l.anchorY}" x2="${endX}" y2="${l.ly}" stroke="#bbb" stroke-width="0.7"/>`;
    const anchor=l.isRight?'start':'end';
    const fw=l.isTarget?'bold':'normal';
    labelsSvg+=`<text x="${l.lx}" y="${l.ly}" font-size="8" font-weight="${fw}" fill="#444" text-anchor="${anchor}" dominant-baseline="middle">${esc(l.name)} ${l.pctVal}%</text>`;
  });

  const vw=size+120,vh=size+20;
  return `<svg viewBox="${-60} ${-10} ${vw} ${vh}" width="${vw}" xmlns="http://www.w3.org/2000/svg" style="max-width:100%">${slices}${labelsSvg}</svg>`;
}

async function go(){
  const btn=document.getElementById('goBtn');btn.disabled=true;btn.innerHTML='<span class="sp"></span> Working...';Lc();brandColorMap={};
  const dates=getDates();const dateBody={start_date:dates.start,end_date:dates.end};
  try{
    if(!projHidden.value)throw new Error('Please select a project first.');
    const bName=brandInput.value.trim();if(!bName)throw new Error('Please enter a brand name.');
    L('Fetching brands...');const brands=(await api('GET','brands')).data||[];allBrands=brands.sort((a,b)=>a.name.localeCompare(b.name));L(`✓ ${brands.length}`);
    const sid=brandInput.dataset.selectedId||'';let target=sid?brands.find(b=>b.id===sid):null;
    if(!target&&bName)target=brands.find(b=>b.name.toLowerCase().includes(bName.toLowerCase()));
    if(!target){target={id:'__custom__',name:bName};L(`"${bName}" not in project — showing at 0%`,'w')}else L(`Target: ${target.name}`);
    L('Fetching prompts...');let prompts=[];try{prompts=(await api('GET','prompts')).data||[];L(`✓ ${prompts.length}`)}catch(e){L('Prompts: '+e.message+' — continuing','w')}
    L('Fetching models...');let models=[];try{models=((await api('GET','models')).data||[]).filter(m=>m.is_active);L(`✓ ${models.length}`)}catch(e){L('Models: '+e.message+' — continuing','w')}
    L('Fetching brand report...');const reportData=(await api('POST','reports/brands',{},dateBody)).data||[];L(`✓ ${reportData.length}`);
    [...reportData].sort((a,b)=>(b.visibility||0)-(a.visibility||0)).forEach(r=>{if(r.brand?.name)getBrandColor(r.brand.name)});
    getBrandColor(target.name);
    L('Fetching model breakdown...');let modelData=[];try{modelData=(await api('POST','reports/brands',{},{...dateBody,dimensions:['model_id']})).data||[];L(`✓ ${modelData.length}`)}catch(e){L(e.message,'w')}
    L('Fetching prompt breakdown...');let promptData=[];try{promptData=(await api('POST','reports/brands',{},{...dateBody,dimensions:['prompt_id']})).data||[];L(`✓ ${promptData.length}`)}catch(e){L(e.message,'w')}
    L('Rendering...');render({target,brands,prompts,models,reportData,modelData,promptData,dates});L('✓ Done!');
  }catch(e){L(`FATAL: ${e.message}`,'e')}finally{btn.disabled=false;btn.innerHTML='Generate Report'}
}

function render(D){
  const{target,brands,prompts,models,reportData,modelData,promptData,dates}=D;
  let rows=reportData.map(r=>({id:r.brand?.id||'',name:r.brand?.name||'?',vis:r.visibility||0,sov:r.share_of_voice||0,mentions:r.mention_count||0,pos:r.position||0,sent:r.sentiment||0,visTotal:r.visibility_total||0}));
  rows.sort((a,b)=>b.vis-a.vis);
  const zeroRow={id:target.id,name:target.name,vis:0,sov:0,mentions:0,pos:0,sent:0,visTotal:rows[0]?.visTotal||0};
  if(!rows.find(r=>r.id===target.id))rows.push(zeroRow);
  const leader=rows[0];const me=rows.find(r=>r.id===target.id)||zeroRow;
  const gap=((leader.vis-me.vis)*100).toFixed(1);const totalConvo=rows[0]?.visTotal||0;const maxVis=rows[0]?.vis||1;
  const tN=target.name;

  let top10=rows.slice(0,10);if(!top10.find(r=>r.id===target.id))top10.push(me);
  // Bar heights relative to max so tallest bar = 160px
  const barMax=Math.max(...top10.map(r=>r.vis),0.01);

  const sovF=rows.filter(r=>r.sov>0);let sovTop=sovF.slice(0,6);if(!sovTop.find(r=>r.id===target.id))sovTop.push({...me,sov:Math.max(me.sov,0.001)});

  let pRows=[];
  if(promptData.length>0){
    const pm={};prompts.forEach(p=>pm[p.id]=p);const byP={};
    promptData.forEach(pd=>{const pid=pd.prompt?.id||pd.prompt_id;if(!pid)return;if(!byP[pid])byP[pid]=[];byP[pid].push(pd)});
    Object.entries(byP).forEach(([pid,items])=>{const p=pm[pid];const qText=p?.messages?.[0]?.content||p?.text||pid;
      items.sort((a,b)=>(b.visibility||0)-(a.visibility||0));const top3=items.slice(0,3).map(i=>i.brand?.name||'?');
      const mine=items.find(i=>(i.brand?.id)===target.id);
      pRows.push({q:qText,vol:items[0]?.visibility_total||0,leaders:top3,myVis:mine?.visibility||0});
    });pRows.sort((a,b)=>b.vol-a.vol);
  }

  let mBreak=[];let legendBrands=new Set();
  if(modelData.length>0){const byM={};modelData.forEach(md=>{const mid=md.model?.id||md.model_id;if(!mid)return;if(!byM[mid])byM[mid]=[];byM[mid].push({id:md.brand?.id||'',name:md.brand?.name||'?',vis:md.visibility||0})});
    Object.entries(byM).forEach(([mid,items])=>{items.sort((a,b)=>b.vis-a.vis);let t5=items.slice(0,5);
      if(!t5.find(r=>r.id===target.id))t5.push({id:target.id,name:target.name,vis:0});
      t5.forEach(i=>legendBrands.add(i.name));mBreak.push({model:mid,items:t5})});
  }legendBrands.add(target.name);

  document.getElementById('rc').innerHTML=`
  <div class="page" id="pg1">
    <div class="rh"><div class="tl">AI Search Visibility Analysis</div><h1>${esc(tN).toUpperCase()}</h1><div class="dr">${getMonthYear()}</div><img class="rlogo" src="${LOGO}" alt=""></div>
    <div class="mr">
      <div class="mc"><div class="v">${pf(me.vis)}</div><div class="l">AI Visibility</div></div>
      <div class="mc"><div class="v">${me.sent||'-'}</div><div class="l">Reputation</div></div>
      <div class="mc"><div class="v">${pf(me.sov)}</div><div class="l">Market Share</div></div>
      <div class="mc"><div class="v">${rows.length}</div><div class="l">Brands Tracked</div></div>
      <div class="mc"><div class="v">${totalConvo.toLocaleString()}</div><div class="l">Conversations</div></div>
    </div>
    <div class="rs" style="padding-bottom:0"><div class="co">${leader.id!==me.id?`★ <b>${esc(leader.name)}</b> leads at ${pf(leader.vis)}, ${gap}% ahead of ${esc(me.name)}.`:`★ <b>${esc(me.name)}</b> leads the competitive landscape at ${pf(me.vis)} visibility.`}</div></div>
    <div class="rs"><h3>AI Visibility Comparison</h3><div class="ss">The percentage your brand is mentioned in all tracked AI answers</div>
      <div class="bc">${top10.map(r=>`<div class="bg"><div class="bpct">${pf(r.vis)}</div><div class="bbar" style="height:${Math.max(2,(r.vis/barMax)*160)}px;background:${getBrandColor(r.name)}"></div><div class="bl${r.id===target.id?' target':''}">${esc(r.name).split(' ').slice(0,2).join(' ')}</div></div>`).join('')}</div>
    </div>
    ${sovTop.length?`<div class="rs"><h3>Market Share</h3><div class="ss">The percentage your brand is mentioned in AI answers compared to your competitors</div>
      <div class="donut-wrap">${donutSVG(sovTop.map(r=>({name:r.name,val:Math.max(r.sov,0.001),color:getBrandColor(r.name),isTarget:r.id===target.id})),220)}
      <div class="donut-legend">${sovTop.map(r=>`<div${r.id===target.id?' style="font-weight:700"':''}><span style="background:${getBrandColor(r.name)}"></span>${esc(r.name)} ${Math.round(r.sov*100)}%</div>`).join('')}</div></div></div>`:''}
    ${mBreak.length?`<div class="rs"><h3>Visibility by AI Model</h3><div class="ss">Top brands across AI models</div>
      <div class="mb">${mBreak.slice(0,5).map(m=>`<div class="mi"><div class="mn">${esc(m.model.replace(/-scraper/g,'').replace(/-/g,' '))}</div>
        <div class="mm">${m.items.map(it=>`<div class="mmb" style="height:${Math.max(it.id===target.id?2:6,Math.min(70,it.vis*100*1.4))}px;background:${getBrandColor(it.name)}"></div>`).join('')}</div></div>`).join('')}</div>
      <div class="model-legend">${[...legendBrands].map(n=>`<div class="ml-item"><div class="ml-dot" style="background:${getBrandColor(n)}"></div><span${n===tN?' style="font-weight:700"':''}>${esc(n)}</span></div>`).join('')}</div></div>`:''}
  </div>

  <div class="page" id="pg2">
    <div class="rs"><h3>Top Competitors</h3><div class="ss">Competitors ranked by AI Visibility</div>
      <table class="bt"><thead><tr><th>#</th><th>Brand</th><th>Visibility</th><th>Market Share</th><th>Mentions</th><th>Avg. Position</th><th>Reputation</th></tr></thead><tbody>
      ${rows.map((r,i)=>`<tr class="${r.id===target.id?'hl':''}">
        <td class="rk">${i+1}</td><td class="bn">${r.id===target.id?'<b>'+esc(r.name)+'</b>':esc(r.name)}</td>
        <td><span class="vis-bar"><span class="fill" style="width:${maxVis>0?Math.min(100,(r.vis/maxVis)*100):0}%"></span></span><span class="nm">${pf(r.vis)}</span></td>
        <td class="nm">${pf(r.sov)}</td><td class="nm">${r.mentions.toLocaleString()}</td>
        <td class="nm">${r.pos?r.pos.toFixed(1):'-'}</td>
        <td><span class="sent-bar"><span class="fill" style="width:${Math.min(100,r.sent)}%"></span></span><span class="nm">${r.sent||'-'}</span></td>
      </tr>`).join('')}</tbody></table>
    </div>
  </div>

  <div class="page" id="pg3">
    ${pRows.length?`<div class="rs"><h3>Top Search Prompts</h3><div class="ss">Top 25 prompts by search volume</div>
      <table class="pt"><thead><tr><th>#</th><th>Query</th><th>Visibility</th><th>Leaders</th></tr></thead><tbody>
      ${pRows.slice(0,25).map((p,i)=>{const hasT=p.leaders.some(l=>l.toLowerCase()===tN.toLowerCase());
        return `<tr${hasT?' style="background:#f0edff"':''}><td class="rk">${i+1}</td>
        <td class="pq" title="${esc(p.q)}">"${esc(p.q.substring(0,65))}${p.q.length>65?'…':''}"</td>
        <td class="nm"${hasT?' style="font-weight:700;color:#6c5ce7"':''}>${pf(p.myVis)}</td>
        <td class="leaders-cell">${p.leaders.map(l=>l.toLowerCase()===tN.toLowerCase()?'<b style="color:#6c5ce7">'+esc(l)+'</b>':esc(l)).join(', ')}</td></tr>`}).join('')}</tbody></table></div>`:''}
    <div class="rs"><h3>Key Takeaways</h3>
      <ul class="tk">
        <li><b>${esc(leader.name)}</b> leads overall visibility at ${pf(leader.vis)}${leader.id!==me.id?`, ${gap}% ahead of ${esc(me.name)} at ${pf(me.vis)}`:''}.  </li>
        <li><b>${esc(me.name)}</b> ${me.mentions>0?`commands ${pf(me.sov)} market share with ${me.mentions.toLocaleString()} mentions`:'is tracked for competitive intelligence'}${me.id===leader.id?', leading the field':''}.</li>
        <li>${rows.length} brands tracked across ${models.length} AI platforms and ${prompts.length} prompts over ${totalConvo.toLocaleString()} total conversations.</li>
        ${rows.length>1?`<li>A ${((rows[0].vis-rows[rows.length-1].vis)*100).toFixed(1)}% visibility gap separates the top brand from ${esc(rows[rows.length-1].name)} at ${pf(rows[rows.length-1].vis)}.</li>`:''}
        ${me.sent>0?`<li><b>${esc(me.name)}</b> has a reputation score of ${me.sent}/100, indicating ${me.sent>=60?'positive':'neutral'} brand perception across AI platforms.</li>`:''}
        <li>Lower-visibility brands should target niche prompts where competition is thinner to build topical authority.</li>
      </ul>
    </div>
    <div class="meth">Methodology — Data across ${models.length} AI platforms, ${prompts.length} prompts, ${totalConvo.toLocaleString()} conversations. Visibility = appearances / total conversations. Market Share = brand mentions / total brand mentions. Reputation scored 0-100 (50=neutral). Report generated via Peec.ai API on ${new Date().toLocaleDateString()}.</div>
  </div>`;
  document.getElementById('rpt').classList.add('on');document.getElementById('rpt').scrollIntoView({behavior:'smooth'});
}

async function dlPDF(){
  const pages=document.querySelectorAll('.page');if(!pages.length)return alert('Generate a report first.');
  const btn=document.getElementById('dlBtn');btn.innerHTML='<span class="sp"></span> Generating...';btn.disabled=true;
  try{if(!window.jspdf?.jsPDF)throw new Error('jsPDF not loaded.');const{jsPDF}=window.jspdf;const pdf=new jsPDF('p','mm','a4');
    const pw=210,ph=297;
    for(let i=0;i<pages.length;i++){
      if(i>0)pdf.addPage();
      const cv=await html2canvas(pages[i],{scale:2,useCORS:true,logging:false,backgroundColor:'#ffffff',width:pages[i].scrollWidth});
      const img=cv.toDataURL('image/jpeg',0.92);
      const iw=pw,ih=(cv.height*iw)/cv.width;
      if(ih<=ph){pdf.addImage(img,'JPEG',0,0,iw,ih)}
      else{let pos=0;while(pos<ih){if(pos>0)pdf.addPage();pdf.addImage(img,'JPEG',0,-pos,iw,ih);pos+=ph}}
    }
    pdf.save(`AI Visibility Analysis - ${(brandInput.value||'Report').replace(/[^\w\s-]/g,'').trim()}.pdf`);
  }catch(e){alert('PDF error: '+e.message)}finally{btn.innerHTML='⬇ Download PDF';btn.disabled=false}
}
</script>
